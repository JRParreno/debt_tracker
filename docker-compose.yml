services:
  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: debt_tracker
      POSTGRES_PASSWORD: debt_tracker
      POSTGRES_DB: debt_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debt_tracker -d debt_tracker"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  postgres_data:
